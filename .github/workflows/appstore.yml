name: App Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to submit (e.g., 1.0.0)"
        required: true

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app bundle
        run: pyinstaller build/firewall-analyzer.spec --distpath dist --workpath build/output --noconfirm

      - name: Copy privacy manifest into bundle
        run: cp build/PrivacyInfo.xcprivacy "dist/Firewall Analyzer.app/Contents/Resources/"

      - name: Import signing certificates
        env:
          APPLE_APP_CERT_BASE64: ${{ secrets.APPLE_APP_CERT_BASE64 }}
          APPLE_APP_CERT_PASSWORD: ${{ secrets.APPLE_APP_CERT_PASSWORD }}
          APPLE_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_BASE64 }}
          APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain"
          security create-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"

          # Import Mac App Distribution certificate
          APP_CERT=$(mktemp /tmp/cert.XXXXXX.p12)
          echo "$APPLE_APP_CERT_BASE64" | base64 --decode > "$APP_CERT"
          security import "$APP_CERT" -k "$KEYCHAIN" -P "$APPLE_APP_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm -f "$APP_CERT"

          # Import Mac Installer Distribution certificate
          INST_CERT=$(mktemp /tmp/cert.XXXXXX.p12)
          echo "$APPLE_INSTALLER_CERT_BASE64" | base64 --decode > "$INST_CERT"
          security import "$INST_CERT" -k "$KEYCHAIN" -P "$APPLE_INSTALLER_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm -f "$INST_CERT"

          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "" "$KEYCHAIN"

      - name: Code sign for App Store (sandboxed)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="3rd Party Mac Developer Application: Wesley Lombardo ($APPLE_TEAM_ID)"

          # Sign all nested frameworks and dylibs
          find "dist/Firewall Analyzer.app" -name "*.dylib" -o -name "*.so" -o -name "*.framework" | while read f; do
            codesign --force --options runtime --entitlements build/entitlements-appstore.plist --sign "$IDENTITY" "$f" 2>/dev/null || true
          done

          # Sign the main executable
          codesign --force --options runtime --entitlements build/entitlements-appstore.plist --sign "$IDENTITY" "dist/Firewall Analyzer.app/Contents/MacOS/Firewall Analyzer"

          # Sign the app bundle
          codesign --force --deep --options runtime --entitlements build/entitlements-appstore.plist --sign "$IDENTITY" "dist/Firewall Analyzer.app"

          # Verify
          codesign -dv --verbose "dist/Firewall Analyzer.app"

      - name: Create installer package
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          INSTALLER_IDENTITY="3rd Party Mac Developer Installer: Wesley Lombardo ($APPLE_TEAM_ID)"

          productbuild --component "dist/Firewall Analyzer.app" /Applications \
            --sign "$INSTALLER_IDENTITY" \
            "dist/Firewall-Analyzer.pkg"

      - name: Upload to App Store Connect
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun altool --upload-app \
            --type osx \
            --file "dist/Firewall-Analyzer.pkg" \
            --apiKey "$APPLE_ID" \
            --apiIssuer "$APPLE_TEAM_ID" 2>&1 || \
          xcrun altool --upload-app \
            --type osx \
            --file "dist/Firewall-Analyzer.pkg" \
            --username "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" 2>&1

      - name: Upload pkg as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firewall-Analyzer-AppStore-pkg
          path: dist/Firewall-Analyzer.pkg
