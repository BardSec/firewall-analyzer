name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app bundle
        run: pyinstaller build/firewall-analyzer.spec --distpath dist --workpath build/output --noconfirm

      - name: Create DMG
        run: |
          hdiutil create -volname "Firewall Analyzer" \
            -srcfolder "dist/Firewall Analyzer.app" \
            -ov -format UDZO \
            "dist/Firewall-Analyzer-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firewall-Analyzer-macOS
          path: dist/Firewall-Analyzer-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe
        run: pyinstaller build/firewall-analyzer.spec --distpath dist --workpath build/output --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firewall-Analyzer-Windows
          path: dist/Firewall Analyzer/
