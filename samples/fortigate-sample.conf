config firewall address
    edit "internal-servers"
        set subnet 10.1.1.0 255.255.255.0
    next
    edit "student-wifi"
        set subnet 10.10.0.0 255.255.0.0
    next
    edit "admin-workstations"
        set subnet 10.1.2.0 255.255.255.0
    next
    edit "public-dns"
        set subnet 8.8.8.0 255.255.255.0
    next
    edit "bad-actor-ip"
        set subnet 203.0.113.50 255.255.255.255
    next
    edit "wide-open-range"
        set subnet 10.0.0.0 255.0.0.0
    next
    edit "dmz-servers"
        set subnet 172.16.1.0 255.255.255.0
    next
end

config firewall service custom
    edit "student-web"
        set tcp-portrange 80 443 8080
    next
    edit "admin-ssh"
        set tcp-portrange 22
    next
    edit "dns-service"
        set udp-portrange 53
        set tcp-portrange 53
    next
end

config firewall policy
    edit 1
        set name "allow-all-outbound"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set status enable
        set logtraffic none
    next
    edit 2
        set name "block-bad-actor"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "bad-actor-ip"
        set service "ALL"
        set action deny
        set status enable
        set logtraffic all
    next
    edit 3
        set name "student-web-access"
        set srcintf "wifi"
        set dstintf "wan1"
        set srcaddr "student-wifi"
        set dstaddr "all"
        set service "student-web"
        set action accept
        set status enable
        set logtraffic all
    next
    edit 4
        set name "student-web-access-duplicate"
        set srcintf "wifi"
        set dstintf "wan1"
        set srcaddr "student-wifi"
        set dstaddr "all"
        set service "student-web"
        set action accept
        set status enable
        set logtraffic all
    next
    edit 5
        set name "admin-ssh-to-servers"
        set srcintf "internal"
        set dstintf "dmz"
        set srcaddr "admin-workstations"
        set dstaddr "internal-servers"
        set service "admin-ssh"
        set action accept
        set status enable
        set logtraffic all
    next
    edit 6
        set name "admin-full-access"
        set srcintf "internal"
        set dstintf "dmz"
        set srcaddr "admin-workstations"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set status enable
        set logtraffic none
    next
    edit 7
        set name "deny-students-to-admin"
        set srcintf "wifi"
        set dstintf "internal"
        set srcaddr "student-wifi"
        set dstaddr "admin-workstations"
        set service "ALL"
        set action deny
        set status enable
        set logtraffic all
    next
    edit 8
        set name "allow-dns"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "public-dns"
        set service "dns-service"
        set action accept
        set status enable
        set logtraffic all
    next
    edit 9
        set name "wide-open-internal"
        set srcintf "internal"
        set dstintf "dmz"
        set srcaddr "wide-open-range"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set status enable
        set logtraffic none
    next
    edit 10
        set name "disabled-legacy-rule"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set status disable
        set logtraffic none
    next
end
